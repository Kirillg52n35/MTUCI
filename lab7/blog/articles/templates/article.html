<!DOCTYPE html>
<html>
<head>
    <title>{{ post.title }}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
</head>
<body class="article">
    <div class="header">
        <img src="{% static 'img/logo.png' %}" alt="Логотип">
        <a href="/" class="back-link">← Все записи</a>
        <a href="{% url 'create_post' %}" class="new-post-btn">+ Новая статья</a>
    </div>
    
    <div class="content">
        <h1 class="post-title">{{ post.title }}</h1>
        
        <div class="article-info">
            <div class="article-author">{{ post.author.username }}</div>
            <div class="article-created-date">{{ post.created_date }}</div>
        </div>
        
        <div class="article-text">
            {{ post.text|linebreaks }}
        </div>
    </div>
</body>
</html>
